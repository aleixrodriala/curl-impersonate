name: Probe Android consumer Chrome

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          sudo usermod -aG kvm "$USER"
          sudo chmod 666 /dev/kvm

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Download Play-delivered consumer Chrome
        run: |
          python -m pip install gplaydl==2.1.5
          authenticated=false
          for attempt in 1 2 3 4 5; do
            if gplaydl auth >/dev/null; then
              authenticated=true
              break
            fi
            sleep 5
          done
          test "$authenticated" = true
          gplaydl download com.android.chrome \
            --output "${RUNNER_TEMP}/chrome-apks" \
            --no-extras

      - name: Inspect the Play Store system image
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_7
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -no-snapshot
            -noaudio -no-boot-anim
          disable-animations: true
          script: |
            adb shell getprop ro.build.fingerprint
            adb shell getprop ro.build.type
            for apk in "${RUNNER_TEMP}"/chrome-apks/*.apk; do apksigner verify --print-certs "$apk"; done
            adb install-multiple "${RUNNER_TEMP}"/chrome-apks/*.apk
            adb shell dumpsys package com.android.chrome | grep -E 'versionName=|versionCode=|signatures=|flags='
            adb shell am set-debug-app --persistent com.android.chrome
            adb shell am start -W \
              -a android.intent.action.VIEW \
              -d https://tls.peet.ws/api/all \
              com.android.chrome
            sleep 5
            adb shell cat /proc/net/unix | grep chrome_devtools_remote
