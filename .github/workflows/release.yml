name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-unix:
    name: Build Linux, macOS, BSD, Android, and iOS artifacts
    uses: ./.github/workflows/build.yml

  build-windows:
    name: Build Windows artifacts
    uses: ./.github/workflows/build-win.yaml

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - build-unix
      - build-windows
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts.*
          path: ${{ runner.temp }}/release-assets
          merge-multiple: true

      - name: Collect release files
        id: collect-release-files
        run: |
          shopt -s nullglob
          files=("${{ runner.temp }}/release-assets"/*.tar.gz)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets were downloaded." >&2
            exit 1
          fi

          printf 'Release assets:\n'
          printf ' - %s\n' "${files[@]##*/}"

          {
            echo "files<<EOF"
            printf '%s\n' "${files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          files: ${{ steps.collect-release-files.outputs.files }}
          prerelease: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}
          draft: ${{ contains(github.ref_name, 'a') || contains(github.ref_name, 'b') || contains(github.ref_name, 'rc') }}

  notify-curl-cffi:
    name: Notify curl_cffi fork
    runs-on: ubuntu-24.04
    needs: publish-release
    env:
      DISPATCH_TOKEN: ${{ secrets.CURL_CFFI_DISPATCH_TOKEN }}
    steps:
      - name: Dispatch released profile set
        if: env.DISPATCH_TOKEN != ''
        env:
          GH_TOKEN: ${{ env.DISPATCH_TOKEN }}
        run: |
          curl_version="${GITHUB_REF_NAME#v}"
          gh api \
            --method POST \
            repos/aleixrodriala/curl_cffi/dispatches \
            --input - <<JSON
          {
            "event_type": "curl_impersonate_release",
            "client_payload": {
              "curl_version": "${curl_version}",
              "curl_tag": "${GITHUB_REF_NAME}",
              "curl_sha": "${GITHUB_SHA}"
            }
          }
          JSON

      - name: Report disabled handoff
        if: env.DISPATCH_TOKEN == ''
        run: |
          echo "CURL_CFFI_DISPATCH_TOKEN is not configured; skipping handoff."
