name: Build and push docker images

on:
  push:
    branches:
      - main
      - feature/*
      - bugfix/*
      - chore/*
      - security/*
    tags:
      - "v*"
  pull_request:
    branches:
      - main
env:
  DOCKER_CLI_EXPERIMENTAL: enabled

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up docker buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure image publication
        id: image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]] && \
             [[ -n "$DOCKER_USERNAME" ]] && [[ -n "$DOCKER_TOKEN" ]]; then
            echo "push_image=true" >> "$GITHUB_OUTPUT"
            echo "namespace=$DOCKER_USERNAME" >> "$GITHUB_OUTPUT"
          else
            echo "push_image=false" >> "$GITHUB_OUTPUT"
            echo "namespace=local" >> "$GITHUB_OUTPUT"
          fi
          if [[ "${GITHUB_REF}" =~ ^refs/tags/v ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to DockerHub
        if: steps.image.outputs.push_image == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build debian docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/debian.dockerfile
          push: ${{ steps.image.outputs.push_image }}
          tags: |
            ${{ steps.image.outputs.namespace }}/curl-impersonate:${{ steps.image.outputs.tag }}
            ${{ steps.image.outputs.namespace }}/curl-impersonate:latest

      - name: Build alpine docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/alpine.dockerfile
          push: ${{ steps.image.outputs.push_image }}
          tags: |
            ${{ steps.image.outputs.namespace }}/curl-impersonate:${{ steps.image.outputs.tag }}-alpine
            ${{ steps.image.outputs.namespace }}/curl-impersonate:alpine
