name: Harvest consumer Android Chrome fingerprint

on:
  schedule:
    - cron: "47 */6 * * *"
  workflow_dispatch:

concurrency:
  group: consumer-android-chrome-fingerprint-harvest
  cancel-in-progress: false

jobs:
  capture:
    name: Capture Google-signed Android Chrome
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install harvester
        run: |
          python -m pip install uv
          uv sync --project tools/fingerprint-harvester

      - name: Download latest Google-signed x86_64 Chrome
        run: |
          test -x "$(command -v google-chrome)"
          xvfb-run -a uv run --project tools/fingerprint-harvester \
            python tools/fingerprint-harvester/scripts/download_android_chrome.py \
            --arch x86_64 \
            --chrome-binary "$(command -v google-chrome)" \
            --output "${RUNNER_TEMP}/chrome-apks"

      - name: Prepare KVM and ADB
        run: |
          test -c /dev/kvm
          sudo chmod 0666 /dev/kvm
          "${ANDROID_HOME}/platform-tools/adb" start-server

      - name: Capture fresh Android Chrome profiles
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          system-image-api-level: 35
          target: google_apis_playstore
          arch: x86_64
          profile: pixel_7
          emulator-options: >-
            -no-window -gpu swiftshader_indirect -no-snapshot
            -noaudio -no-boot-anim -no-metrics
          disable-animations: true
          script: |
            for apk in "${RUNNER_TEMP}"/chrome-apks/chrome-*.apk; do "${ANDROID_HOME}/build-tools/37.0.0/apksigner" verify "$apk"; "${ANDROID_HOME}/build-tools/37.0.0/apksigner" verify --print-certs "$apk" 2>&1 | grep -F "certificate SHA-256 digest: $(jq -r '.expected_certificate_sha256' "${RUNNER_TEMP}/chrome-apks/metadata.json")"; done
            "${ANDROID_HOME}/build-tools/37.0.0/aapt" dump badging "${RUNNER_TEMP}/chrome-apks/chrome-base.apk" | grep -F "package: name='com.android.chrome'"
            "${ANDROID_HOME}/build-tools/37.0.0/aapt" dump badging "${RUNNER_TEMP}/chrome-apks/chrome-base.apk" | grep -F "versionName='$(jq -r '.version' "${RUNNER_TEMP}/chrome-apks/metadata.json")'"
            unzip -l "${RUNNER_TEMP}/chrome-apks/chrome-base.apk" | grep -F 'lib/x86_64/libchrome.so'
            adb install-multiple -r -d "${RUNNER_TEMP}"/chrome-apks/chrome-*.apk
            adb shell dumpsys package com.android.chrome | grep -m1 -F 'primaryCpuAbi=x86_64'
            adb shell dumpsys package com.android.chrome | grep -E 'versionName=|versionCode=' | head -2
            uv run --project tools/fingerprint-harvester curl-impersonate-harvest android-capture --adb "${ANDROID_HOME}/platform-tools/adb" --expected-version "$(jq -r '.version' "${RUNNER_TEMP}/chrome-apks/metadata.json")" --connect-timeout-ms 60000 --samples 5 --output "${RUNNER_TEMP}/fingerprint-harvester/android"

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-android
          path: ${{ runner.temp }}/fingerprint-harvester
          if-no-files-found: warn
          retention-days: 7

  publish:
    name: Publish a native Android Chrome profile
    needs: capture
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install harvester and native build dependencies
        run: |
          python -m pip install uv
          uv sync --project tools/fingerprint-harvester
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential cmake curl gperf libtool \
            ninja-build pkg-config

      - uses: actions/download-artifact@v4
        with:
          name: chrome-android
          path: ${{ runner.temp }}/fingerprint-evidence

      - name: Prepare candidate and retained evidence
        id: candidate
        run: |
          set -euo pipefail
          bundle="${RUNNER_TEMP}/fingerprint-evidence/android"
          version="$(
            jq -er '
              .browser_identities
              | map(.package_version)
              | unique
              | if length == 1 then .[0]
                else error("capture has inconsistent package versions")
                end
            ' "$bundle/profile.json"
          )"
          target="chrome${version%%.*}_android"
          if [[ -f "profiles/chrome/${target}.json" ]]; then
            echo "Declarative profile ${target} already exists."
            echo "propose=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          retained="profiles/evidence/chrome${version%%.*}/android"
          mkdir -p "$(dirname "$retained")"
          cp -R "$bundle" "$retained"
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest candidate \
            "$retained" \
            --target "$target" \
            --output "profiles/chrome/${target}.json"
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest render \
            "profiles/chrome/${target}.json" \
            --output "profiles/generated/${target}.inc"

          echo "propose=true" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "retained=$retained" >> "$GITHUB_OUTPUT"

      - name: Build and replay native candidate
        if: steps.candidate.outputs.propose == 'true'
        env:
          TARGET: ${{ steps.candidate.outputs.target }}
          RETAINED: ${{ steps.candidate.outputs.retained }}
        run: |
          set -euo pipefail
          make prepare-libidn2 BUILD_DIR=build JOBS=4
          make build BUILD_DIR=build JOBS=4
          make checkbuild BUILD_DIR=build
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest replay \
            "$RETAINED" \
            --curl-binary build/deps/build/curl/src/curl-impersonate \
            --target "$TARGET" \
            --samples 3 \
            --output "${RUNNER_TEMP}/replay/${TARGET}"

      - name: Commit verified profile to the fork
        if: steps.candidate.outputs.propose == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ steps.candidate.outputs.target }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add profiles
          git commit -m "Add ${TARGET} fingerprint profile"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          gh workflow run profile-release.yml --ref "${GITHUB_REF_NAME}"
