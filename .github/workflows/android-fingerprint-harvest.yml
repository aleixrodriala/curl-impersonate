name: Harvest consumer Android Chrome fingerprint

on:
  schedule:
    - cron: "47 */6 * * *"
  workflow_dispatch:

concurrency:
  group: consumer-android-chrome-fingerprint-harvest
  cancel-in-progress: false

jobs:
  capture:
    name: Capture Play-delivered Android Chrome
    runs-on: macos-15
    timeout-minutes: 60
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Authenticate to Google Play
        env:
          GPLAY_AUTH_B64: ${{ secrets.GPLAY_AUTH_B64 }}
          GPLAY_DISPENSER_URL: ${{ secrets.GPLAY_DISPENSER_URL }}
        run: |
          python -m pip install gplaydl==2.1.5 uv
          if [[ -n "$GPLAY_AUTH_B64" ]]; then
            mkdir -p "${HOME}/.config/gplaydl"
            printf '%s' "$GPLAY_AUTH_B64" | base64 -D \
              > "${HOME}/.config/gplaydl/auth-arm64.json"
            exit 0
          fi
          authenticated=false
          for attempt in 1 2 3 4 5; do
            dispenser=()
            if [[ -n "$GPLAY_DISPENSER_URL" ]]; then
              dispenser=(--dispenser "$GPLAY_DISPENSER_URL")
            fi
            if gplaydl auth "${dispenser[@]}" >/dev/null; then
              authenticated=true
              break
            fi
            sleep 5
          done
          test "$authenticated" = true

      - name: Download signed Chrome and Trichrome packages
        run: |
          python tools/fingerprint-harvester/scripts/download_android_chrome.py \
            --output "${RUNNER_TEMP}/chrome-apks"

      - name: Install harvester
        run: uv sync --project tools/fingerprint-harvester

      - name: Capture fresh Android Chrome profiles
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 36
          system-image-api-level: 36.1
          target: google_apis_playstore
          arch: arm64-v8a
          profile: pixel_9
          emulator-options: >-
            -no-window -gpu swiftshader -no-snapshot
            -noaudio -no-boot-anim
          disable-animations: true
          script: |
            set -euo pipefail
            for apk in "${RUNNER_TEMP}"/chrome-apks/*.apk; do
              apksigner verify --print-certs "$apk"
            done
            adb install -r "${RUNNER_TEMP}/chrome-apks/trichrome-base.apk"
            chrome_apks=("${RUNNER_TEMP}"/chrome-apks/chrome-*.apk)
            adb install-multiple -r "${chrome_apks[@]}"
            expected_version="$(
              jq -r '.version' "${RUNNER_TEMP}/chrome-apks/metadata.json"
            )"
            adb shell dumpsys package com.android.chrome | \
              grep -E 'versionName=|versionCode=' | head -2
            uv run --project tools/fingerprint-harvester \
              curl-impersonate-harvest android-capture \
              --adb "${ANDROID_HOME}/platform-tools/adb" \
              --expected-version "$expected_version" \
              --connect-timeout-ms 60000 \
              --samples 5 \
              --output "${RUNNER_TEMP}/fingerprint-harvester/android"

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-android
          path: ${{ runner.temp }}/fingerprint-harvester
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish a native Android Chrome profile
    needs: capture
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install harvester and native build dependencies
        run: |
          python -m pip install uv
          uv sync --project tools/fingerprint-harvester
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential cmake curl gperf libtool \
            ninja-build pkg-config

      - uses: actions/download-artifact@v4
        with:
          name: chrome-android
          path: ${{ runner.temp }}/fingerprint-evidence

      - name: Prepare candidate and retained evidence
        id: candidate
        run: |
          set -euo pipefail
          bundle="${RUNNER_TEMP}/fingerprint-evidence/android"
          version="$(
            jq -er '
              .browser_identities
              | map(.package_version)
              | unique
              | if length == 1 then .[0]
                else error("capture has inconsistent package versions")
                end
            ' "$bundle/profile.json"
          )"
          target="chrome${version%%.*}_android"
          if [[ -f "profiles/chrome/${target}.json" ]]; then
            echo "Declarative profile ${target} already exists."
            echo "propose=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          retained="profiles/evidence/chrome${version%%.*}/android"
          mkdir -p "$(dirname "$retained")"
          cp -R "$bundle" "$retained"
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest candidate \
            "$retained" \
            --target "$target" \
            --output "profiles/chrome/${target}.json"
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest render \
            "profiles/chrome/${target}.json" \
            --output "profiles/generated/${target}.inc"

          echo "propose=true" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"
          echo "retained=$retained" >> "$GITHUB_OUTPUT"

      - name: Build and replay native candidate
        if: steps.candidate.outputs.propose == 'true'
        env:
          TARGET: ${{ steps.candidate.outputs.target }}
          RETAINED: ${{ steps.candidate.outputs.retained }}
        run: |
          set -euo pipefail
          make prepare-libidn2 BUILD_DIR=build JOBS=4
          make build BUILD_DIR=build JOBS=4
          make checkbuild BUILD_DIR=build
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest replay \
            "$RETAINED" \
            --curl-binary build/deps/build/curl/src/curl-impersonate \
            --target "$TARGET" \
            --samples 3 \
            --output "${RUNNER_TEMP}/replay/${TARGET}"

      - name: Commit verified profile to the fork
        if: steps.candidate.outputs.propose == 'true'
        env:
          TARGET: ${{ steps.candidate.outputs.target }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"
          git add profiles
          git commit -m "Add ${TARGET} fingerprint profile"
          git push origin "HEAD:${GITHUB_REF_NAME}"
