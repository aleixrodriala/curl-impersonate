name: Fingerprint harvester checks

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - feature/*
      - feat/*
      - bugfix/*
      - chore/*

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Test and lint
        working-directory: tools/fingerprint-harvester
        run: |
          uv sync --extra dev
          uv run pytest -q
          uv run ruff check .
          uv run ruff format --check .

      - name: Verify declarative legacy profile
        run: |
          uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest render \
            profiles/chrome/chrome146.json \
            --check-patch patches/curl.patch

      - name: Verify generated profile initializers
        run: |
          set -euo pipefail
          shopt -s nullglob
          for initializer in profiles/generated/*.inc; do
            target="$(basename "$initializer" .inc)"
            profile="profiles/chrome/${target}.json"
            test -f "$profile"
            uv run --project tools/fingerprint-harvester \
              curl-impersonate-harvest render "$profile" |
              diff -u "$initializer" -
          done
