name: Harvest consumer Chrome fingerprints

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: consumer-chrome-fingerprint-harvest
  cancel-in-progress: false

jobs:
  capture:
    name: Capture ${{ matrix.chrome_platform }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            chrome_platform: linux
          - os: windows-2025
            chrome_platform: win64
          - os: macos-15-intel
            chrome_platform: mac
          - os: macos-15
            chrome_platform: mac_arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update consumer Chrome on Linux
        if: runner.os == 'Linux'
        run: |
          curl -fsSLo "${RUNNER_TEMP}/google-chrome.deb" \
            https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get update
          sudo apt-get install -y "${RUNNER_TEMP}/google-chrome.deb"

      - name: Update consumer Chrome on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Join-Path $env:RUNNER_TEMP "google-chrome-stable.msi"
          Invoke-WebRequest `
            -Uri "https://dl.google.com/dl/chrome/install/googlechromestandaloneenterprise64.msi" `
            -OutFile $installer
          $install = Start-Process msiexec.exe `
            -ArgumentList "/i `"$installer`" /qn /norestart" `
            -Wait `
            -PassThru
          if ($install.ExitCode -notin 0, 3010) {
            throw "Chrome Stable MSI failed with exit code $($install.ExitCode)"
          }

      - name: Update consumer Chrome on macOS
        if: runner.os == 'macOS'
        run: |
          set -euo pipefail
          chrome_dmg="${RUNNER_TEMP}/google-chrome-stable.dmg"
          mount_point="${RUNNER_TEMP}/google-chrome-mount"
          curl -fsSLo "$chrome_dmg" \
            https://dl.google.com/chrome/mac/universal/stable/GGRO/googlechrome.dmg
          mkdir -p "$mount_point"
          hdiutil attach "$chrome_dmg" \
            -nobrowse \
            -readonly \
            -mountpoint "$mount_point"
          trap 'hdiutil detach "$mount_point"' EXIT
          sudo ditto \
            "$mount_point/Google Chrome.app" \
            "/Applications/Google Chrome.app"

      - name: Install harvester
        run: |
          python -m pip install uv
          uv sync --project tools/fingerprint-harvester

      - name: Capture headful Chrome on Linux
        if: runner.os == 'Linux'
        run: |
          xvfb-run -a uv run --project tools/fingerprint-harvester \
            curl-impersonate-harvest harvest \
            --platform "${{ matrix.chrome_platform }}" \
            --browser-mode headful \
            --samples 5 \
            --allow-version-mismatch \
            --workspace "${RUNNER_TEMP}/fingerprint-harvester"

      - name: Capture headful Chrome on Windows or macOS
        if: runner.os != 'Linux'
        run: >-
          uv run --project tools/fingerprint-harvester
          curl-impersonate-harvest harvest
          --platform "${{ matrix.chrome_platform }}"
          --browser-mode headful
          --samples 5
          --allow-version-mismatch
          --workspace "${{ runner.temp }}/fingerprint-harvester"

      - name: Upload sanitized evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: chrome-${{ matrix.chrome_platform }}
          path: ${{ runner.temp }}/fingerprint-harvester/captures
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish a native Chrome profile
    needs: capture
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install harvester
        run: |
          python -m pip install uv
          uv sync --project tools/fingerprint-harvester

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake build-essential cmake curl gperf libtool \
            ninja-build pkg-config

      - uses: actions/download-artifact@v4
        with:
          pattern: chrome-*
          path: ${{ runner.temp }}/fingerprint-evidence
          merge-multiple: true

      - name: Prepare candidate and retained evidence
        id: candidate
        run: |
          set -euo pipefail
          evidence_root="${RUNNER_TEMP}/fingerprint-evidence"
          mapfile -t manifests < <(find "$evidence_root" -name manifest.json -print)
          if [[ ${#manifests[@]} -ne 4 ]]; then
            echo "Expected four platform manifests, found ${#manifests[@]}" >&2
            exit 1
          fi

          mapfile -t majors < <(
            for manifest in "${manifests[@]}"; do
              jq -er '
                .browser_identities
                | map(.version)
                | unique
                | if length == 1 then .[0]
                  else error("capture has inconsistent browser versions")
                  end
              ' "$(dirname "$manifest")/profile.json"
            done | cut -d. -f1 | sort -u
          )
          if [[ ${#majors[@]} -ne 1 ]]; then
            echo "Consumer Stable has not reached the same major on every OS."
            echo "propose=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          target="chrome${majors[0]}"
          targets=(
            "$target"
            "${target}_linux"
            "${target}_windows"
            "${target}_macos"
          )
          existing=0
          for candidate in "${targets[@]}"; do
            if [[ -f "profiles/chrome/${candidate}.json" ]]; then
              existing=$((existing + 1))
            fi
          done
          if [[ $existing -eq ${#targets[@]} ]]; then
            echo "Declarative OS profiles for ${target} already exist."
            echo "propose=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [[ $existing -ne 0 ]]; then
            echo "Refusing to overwrite a partial ${target} OS profile set." >&2
            exit 1
          fi

          retained="profiles/evidence/${target}"
          mkdir -p "$retained"
          for manifest in "${manifests[@]}"; do
            bundle="$(dirname "$manifest")"
            platform="$(jq -r '.platform' "$manifest")"
            cp -R "$bundle" "$retained/$platform"
          done

          reference="$retained/mac"
          for platform in linux win64 mac_arm64; do
            uv run --project tools/fingerprint-harvester \
              curl-impersonate-harvest diff --transport-only \
              "$reference" "$retained/$platform"
          done

          bundles=(mac linux win64 mac)
          for index in "${!targets[@]}"; do
            candidate="${targets[$index]}"
            bundle="${bundles[$index]}"
            uv run --project tools/fingerprint-harvester \
              curl-impersonate-harvest candidate \
              "$retained/$bundle" \
              --target "$candidate" \
              --output "profiles/chrome/${candidate}.json"
            uv run --project tools/fingerprint-harvester \
              curl-impersonate-harvest render \
              "profiles/chrome/${candidate}.json" \
              --output "profiles/generated/${candidate}.inc"
          done

          echo "propose=true" >> "$GITHUB_OUTPUT"
          echo "target=$target" >> "$GITHUB_OUTPUT"

      - name: Build and replay native OS candidates
        if: steps.candidate.outputs.propose == 'true'
        env:
          TARGET: ${{ steps.candidate.outputs.target }}
        run: |
          set -euo pipefail
          make prepare-libidn2 BUILD_DIR=build JOBS=4
          make build BUILD_DIR=build JOBS=4
          make checkbuild BUILD_DIR=build
          targets=(
            "$TARGET"
            "${TARGET}_linux"
            "${TARGET}_windows"
            "${TARGET}_macos"
          )
          bundles=(mac linux win64 mac)
          for index in "${!targets[@]}"; do
            candidate="${targets[$index]}"
            bundle="${bundles[$index]}"
            uv run --project tools/fingerprint-harvester \
              curl-impersonate-harvest replay \
              "profiles/evidence/${TARGET}/$bundle" \
              --curl-binary build/deps/build/curl/src/curl-impersonate \
              --target "$candidate" \
              --samples 3 \
              --output "${RUNNER_TEMP}/replay/${candidate}"
          done

      - name: Commit verified profile to the fork
        if: steps.candidate.outputs.propose == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TARGET: ${{ steps.candidate.outputs.target }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profiles
          git commit -m "Add ${TARGET} OS fingerprint profiles"
          git push origin "HEAD:${GITHUB_REF_NAME}"
          gh workflow run profile-release.yml --ref "${GITHUB_REF_NAME}"
